{% extends "core/base.html" %}
{% block content %}
<section class="hero-card fade-rise">
  <div class="hero-inner">
    <span class="eyebrow"><i class="bi bi-heart-pulse"></i> Cuidado Pastoral</span>
    <h1 class="hero-title">Pedido de Oração</h1>
    <p class="hero-subtitle">Envie seu pedido e nossa equipe pastoral irá interceder por você.</p>
  </div>
</section>

<section class="section-card mt-4 p-4 fade-rise delay-1">
  {% if sucesso %}
    <div class="alert alert-success">Seu pedido foi enviado com sucesso. Deus abençoe sua vida.</div>
  {% endif %}

  <form method="post" class="form-card">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6">
        <label for="nome" class="form-label fw-semibold">Nome (opcional)</label>
        <input type="text" class="form-control cm-input" id="nome" name="nome">
      </div>
      <div class="col-md-6">
        <label for="telefone" class="form-label fw-semibold">Telefone (opcional)</label>
        <input type="text" class="form-control cm-input" id="telefone" name="telefone">
      </div>
      <div class="col-md-12">
        <label for="email" class="form-label fw-semibold">E-mail (opcional)</label>
        <input type="email" class="form-control cm-input" id="email" name="email">
      </div>
      <div class="col-md-12">
        <label for="pedido" class="form-label fw-semibold">Seu pedido</label>
        <textarea class="form-control cm-textarea" id="pedido" name="pedido" rows="5" required></textarea>
      </div>
      <div class="col-md-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" value="on" id="confidencial" name="confidencial" checked>
          <label class="form-check-label" for="confidencial">Marcar como confidencial</label>
        </div>
      </div>
      <div class="col-md-12">
        <button type="submit" class="btn cm-btn">Enviar Pedido</button>
      </div>
    </div>
  </form>
</section>
{% endblock %}
